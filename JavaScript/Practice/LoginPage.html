<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 200vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4caca;
        }

        .login-container {
            width: 320px;
            background: linear-gradient(to bottom, #ff9233, #0099e6);
            padding: 30px 25px;
            text-align: center;
            color: #77cc62;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .logo span {
            display: block;
            font-size: 14px;
            font-weight: normal;
            margin-top: 5px;
        }

        .top-text {
            margin-bottom: 25px;
            font-size: 14px;
            color: #d70c0c;
        }

        .top-text a {
            color: #d9dbde;
            font-weight: bold;
            text-decoration: none;
        }

        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        .input-box input {
            width: 100%;
            padding: 12px 40px 12px 40px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.35);
            color: #222;
            font-size: 14px;
        }

        .input-box .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #333;
            font-size: 16px;
        }

        .input-box .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #333;
            font-size: 16px;
        }

        .login-btn {
            width: 120px;
            padding: 10px;
            border: none;
            background: #2f4f6f;
            color: rgb(247, 209, 209);
            font-weight: bold;
            cursor: pointer;
            margin: 15px 0 20px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #1f3850;
        }

        .bottom-text {
            font-size: 14px;
            color: #eae3e3;
        }

        .bottom-text a {
            color: #dce1e9;
            text-decoration: none;
            font-weight: bold;
        }

        .message {
            margin-top: 10px;
            font-size: 14px;
            color: rgb(0, 255, 55);
            min-height: 20px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">
            Lambda Credit Card
        </div>

        <div class="top-text">
            Have an account? <a href="#">Log in</a>
        </div>

        <div class="input-box">
            <span class="icon">👤</span>
            <input type="text" id="username" placeholder="Username">
            <span class="toggle-username" onclick="toggleUsername()">👁</span>
        </div>

        <div class="input-box">
            <span class="icon">🔒</span>
            <input type="password" id="password" placeholder="Password">
            <span class="toggle-password" onclick="togglePassword()">👁</span>
        </div>

        <button class="login-btn" onclick="loginUser()">LOG IN</button>

        <div class="bottom-text">
            Don't have an account? <a href="#">Register</a>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        if (username === "") {
            error.textContent = "Username is required";
            return;
        }

        // 2. Length check
        if (username.length < 3) {
            error.textContent = "Minimum 3 characters required";
            return;
        }

        // 3. Pattern check (only letters, numbers, underscore)
        const pattern = /^[a-zA-Z0-9_]+$/;

        if (!pattern.test(username)) {
            error.textContent = "Only letters, numbers, underscore allowed";
            return;
        }

    

        function togglePassword() {
            const passwordInput = document.getElementById("password");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
            } else {
                passwordInput.type = "password";
            }
        }

        function loginUser() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const message = document.getElementById("message");

            if (username === "" || password === "") {
                message.textContent = "Please enter username and password.";
                return;
            }

            message.textContent = "Login successful!";
        }
    </script>

</body>

</html>
