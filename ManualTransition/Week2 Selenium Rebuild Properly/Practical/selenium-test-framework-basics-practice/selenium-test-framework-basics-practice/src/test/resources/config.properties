# Application URL is intentionally kept outside Java test code.
# This makes the framework easy to move between local, QA, staging, and production environments.
app.url=sample-site/framework-basics-practice.html

# Default browser can be overridden from command line:
# mvn test -Dbrowser=edge
browser=chrome

# Timeout values are centralized, so tests do not hardcode waits everywhere.
explicit.wait.seconds=10
