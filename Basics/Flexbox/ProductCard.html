    <div id="card" style="border:1px solid #ccc; padding:15px; width:250px; border-radius:8px;">
        <h2 id="name">Kumar</h2>
        <p id="role">Software Engineer</p>
        <p>Status: <span id="status">Active</span></p>
        <button onclick="toggleStatus()">Toggle Status</button>
    </div>

    <script>
        function toggleStatus() {
            let statusEl = document.getElementById("status");

            if (statusEl.innerText === "Active") {
                statusEl.innerText = "Inactive";
            } else {
                statusEl.innerText = "Active";
            }
        }
    </script>
