<!DOCTYPE html>
<html>
<head>
  <style>
    .form-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .form-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 300px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .form-box input,
    .form-box button {
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="form-box">
      <h2>Login</h2>
      <input type="email" placeholder="Enter email">
      <input type="password" placeholder="Enter password">
      <button>Submit</button>
    </div>
  </div>
</body>
</html>
